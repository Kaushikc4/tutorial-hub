services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: tutorials
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./tutorials_backend
    ports:
      - "8000:8000"
    environment:
      PGHOST: postgres
      PGPORT: 5432
      PGDATABASE: tutorials
      PGUSER: postgres
      PGPASSWORD: ${PGPASSWORD:-postgres}
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-change-me}
      DJANGO_ALLOWED_HOSTS: "${DJANGO_ALLOWED_HOSTS:-*}"
      DJANGO_DEBUG: "0"
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_STORAGE_BUCKET_NAME: ${AWS_STORAGE_BUCKET_NAME:-}
      AWS_S3_REGION_NAME: ${AWS_S3_REGION_NAME:-us-east-1}
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build: ./tutorials_frontend
    ports:
      - "8501:8501"
    environment:
      TUTORIAL_API_URL: http://backend:8000/api/tutorial
    depends_on:
      - backend

volumes:
  postgres_data:
